services:
  - type: web
    name: studio88-lesotho-backend
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: FRONTEND_ORIGIN
        value: https://studio88-lesotho.vercel.app
      - key: SEED_SECRET
        value: studio88seed2026
      - key: PYTHON_VERSION
        value: 3.11.9
